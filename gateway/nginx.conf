events {}

http {
    # CORS: permite cualquier puerto de localhost en desarrollo
    map $http_origin $cors_origin {
        default "";
        "~^http://localhost(:\d+)?$" $http_origin;
    }

    server {
        listen 8080;
        server_name _;

        location /matches/ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            proxy_pass http://icarus-matches:4002/;
        }

        location /auth/ {
            proxy_pass http://icarus-auth:4001/;
        }

        location /rooms/ {
            proxy_pass http://icarus-rooms:4003/;
        }

        location /analytics/ {
            proxy_pass http://icarus-analytics:4004/;
        }

        location /store/ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            proxy_pass http://icarus-store:4005/;
        }

        location /get_products {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            proxy_pass http://icarus-store:4005;
        }

        location /create_checkout {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            proxy_pass http://icarus-store:4005/create_checkout;
        }

        location /profile/ {
            add_header Access-Control-Allow-Origin "http://localhost:5173" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            proxy_pass http://icarus-profile:4006/;
        }

        location /cards/ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
                return 204;
            }

            proxy_pass http://icarus-cards:4009/;
        }
    }
}